<!DOCTYPE html>
<html>
<head>

<title>Master Sewing Machine House</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.header{
background:#232f3e;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:30px;
font-weight:bold;
}

.cart{
font-size:20px;
}

.search{
background:white;
padding:20px;
text-align:center;
}

.search input{
width:400px;
padding:10px;
font-size:18px;
}

.search button{
padding:10px 20px;
font-size:18px;
background:orange;
border:none;
cursor:pointer;
}

.category{
text-align:center;
padding:20px;
}

.category a{
text-decoration:none;
padding:12px 20px;
background:#232f3e;
color:white;
margin:5px;
border-radius:5px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.card{
background:white;
width:250px;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px gray;
text-align:center;
}

.card img{
width:220px;
height:220px;
object-fit:cover;
}

.price{
font-size:22px;
color:green;
font-weight:bold;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
}

.cartbtn{
background:orange;
}

.buybtn{
background:green;
color:white;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">
MASTER SEWING MACHINE HOUSE
</div>

<div class="cart">

🛒 {{ total_items }} Products |
₹ {{ total_bill }}

<br><br>

<a href="/cart">
<button>Open Cart</button>
</a>

</div>

</div>

<div class="search">

<form method="GET">

<input
type="text"
name="search"
placeholder="Search Sewing Machine..."
>

<button>
Search
</button>

</form>

</div>

<div class="category">

<a href="/">All</a>

<a href="/?category=machines">
Machines
</a>

<a href="/?category=spares">
Spares
</a>

<a href="/?category=oil">
Oil
</a>

<a href="/?category=iron">
Iron
</a>

</div>

<div class="products">

{% for p in products %}

<div class="card">

<img
src="{{ url_for('static', filename=p[3]) }}"
>

<h3>{{ p[1] }}</h3>

<div class="price">
₹ {{ p[2] }}
</div>

<a href="/add_to_cart/{{ p[0] }}">
<button class="cartbtn">
🛒 Add to Cart
</button>
</a>

<a href="/buy/{{ p[0] }}">
<button class="buybtn">
⚡ Buy Now
</button>
</a>

</div>

{% endfor %}

</div>

</body>
</html>
